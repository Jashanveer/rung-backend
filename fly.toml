app = "rung-backend-dev"
primary_region = "iad"

[build]
  dockerfile = "DockerFile"

[env]
  SPRING_PROFILES_ACTIVE = "production"
  PORT = "8080"
  JAVA_TOOL_OPTIONS = "-XX:MaxRAMPercentage=75.0 -XX:+UseSerialGC -Djava.security.egd=file:/dev/./urandom"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "120s"
    method = "GET"
    path = "/actuator/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
