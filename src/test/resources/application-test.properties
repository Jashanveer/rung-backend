# Test-only overrides. Dummy values that satisfy startup validators so the
# Spring context can load without requiring real env vars or secrets on CI.
app.jwt.secret=test-only-secret-not-used-outside-junit-32
app.jwt.expirationMinutes=60
app.jwt.issuer=habit-tracker-test

# Disable schema validation + migrations; use an in-memory H2 via profile-less
# defaults would still hit Postgres, so pin to H2 here.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Disable APNs + mail so no background tasks try to connect.
apns.team-id=
apns.key-id=
apns.private-key=
spring.mail.host=
anthropic.api-key=
