# Server
server.port=${PORT:8080}

# ===============================
# Database (Postgres)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/habitdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:habit_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# ===============================
# JWT / App Secrets
# ===============================
app.jwt.secret=${JWT_SECRET:{5,=LWBZIG)V|oLx8#>(>:Isa4ZV9Aw^7V|KI4/Y.bZ}
app.jwt.expirationMinutes=${JWT_EXP_MINUTES:120}
app.jwt.issuer=habit-tracker

# ===============================
# CORS (frontend domain)
# ex: http://localhost:5173 or https://yourapp.netlify.app
# ===============================
app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
