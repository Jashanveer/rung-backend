# Server
server.port=${PORT:8080}

# ===============================
# Database (Postgres)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/habitdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:habit_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# ===============================
# JWT / App Secrets
# ===============================
app.jwt.secret=${JWT_SECRET:{5,=LWBZIG)V|oLx8#>(>:Isa4ZV9Aw^7V|KI4/Y.bZ}
app.jwt.expirationMinutes=${JWT_EXP_MINUTES:120}
app.jwt.issuer=habit-tracker

# ===============================
# CORS (frontend domain)
# ex: http://localhost:5173 or https://yourapp.netlify.app
# ===============================
app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# APNs (Apple Push Notification service)
# Set via environment variables â€” leave blank to disable push (SSE still works).
#
# Steps to enable:
#   1. In Apple Developer portal â†’ Certificates â†’ Keys â†’ create an APNs key (.p8)
#   2. Note the Key ID and your Team ID (top-right of the portal)
#   3. Set APNS_TEAM_ID, APNS_KEY_ID, APNS_PRIVATE_KEY (full p8 content, \n-separated)
#   4. Set APNS_BUNDLE_ID to match your Xcode bundle identifier
#   5. Set APNS_SANDBOX=false for production / App Store builds
# ===============================
apns.team-id=${APNS_TEAM_ID:}
apns.key-id=${APNS_KEY_ID:}
apns.private-key=${APNS_PRIVATE_KEY:}
apns.bundle-id=${APNS_BUNDLE_ID:com.jashanveer.habit-tracker-macos}
apns.sandbox=${APNS_SANDBOX:true}

# ===============================
# Email (SMTP)
# Leave MAIL_HOST blank to disable email sending entirely.
#
# Gmail quick-start:
#   1. Enable "App Passwords" in your Google account (requires 2FA)
#   2. Set MAIL_HOST=smtp.gmail.com  MAIL_PORT=587
#      MAIL_USERNAME=you@gmail.com  MAIL_PASSWORD=<app-password>
#      MAIL_FROM=you@gmail.com
#
# SendGrid / Mailgun / AWS SES also work â€” just point to their SMTP endpoint.
# ===============================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from=${MAIL_FROM:noreply@habit-tracker.app}
app.reset-base-url=${RESET_BASE_URL:https://habit-tracker.app/reset}
