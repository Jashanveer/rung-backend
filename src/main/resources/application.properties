# Auto-load the project-root .env file (KEY=VALUE format, same as .properties).
# This means `./mvnw spring-boot:run`, IDE "Run" buttons, and `./run-local.sh`
# all pick up the same secrets with zero extra configuration.
# Real OS env vars still take precedence, which is what deployment platforms use.
spring.config.import=optional:file:./.env[.properties]

# Server
server.port=${PORT:8080}

# Actuator — only the health endpoint is exposed by default. Used by load
# balancer probes and uptime checks; everything else (env, metrics, beans)
# stays internal to avoid leaking config or fingerprinting the runtime.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Don't echo the request URI / message in error JSON — limits info leakage
# from accidentally-reachable error pages.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Async / SSE — keep long-lived per-user streams alive for the full 30-minute
# emitter timeout instead of letting Tomcat's default 30-second async timeout
# tear them down mid-stream. Cross-device habit sync depends on these
# connections staying open.
spring.mvc.async.request-timeout=1800000

# ===============================
# Field-level encryption
# Generate a 32-byte key with:  openssl rand -base64 32
# Leave blank to disable (values stored as plaintext — OK for dev).
# ===============================
app.encryption.key=${APP_ENCRYPTION_KEY:}

# Jackson
spring.jackson.time-zone=UTC

# Active profile — INTENTIONALLY no default. With nothing set, only the base
# application.properties loads (prod-shaped: ddl-auto=validate, Flyway on).
# Local dev opts in via .env line `SPRING_PROFILES_ACTIVE=local`, which then
# layers application-local.properties on top (ddl-auto=update, Flyway off).
# Previous default of `local` was a deploy-time foot-gun: forgetting to set
# the env var in prod would let Hibernate silently mutate the schema.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

# ===============================
# Database (Postgres)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/habitdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:habit_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.initialization-fail-timeout=${SPRING_DATASOURCE_INIT_FAIL_TIMEOUT:10000}
spring.datasource.hikari.validation-timeout=${SPRING_DATASOURCE_VALIDATION_TIMEOUT:5000}
# Sized for SSE workload — each connected device borrows a connection during
# the controller dispatch, plus the heartbeat thread, plus scheduled jobs +
# the Anthropic listener pool. Default of 10 is trivially exhausted.
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL:20}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_MIN_IDLE:4}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# ===============================
# JWT / App Secrets
# ===============================
app.jwt.secret=${JWT_SECRET:}
app.jwt.expirationMinutes=${JWT_EXP_MINUTES:120}
app.jwt.issuer=habit-tracker

# ===============================
# CORS (frontend domain)
# ex: http://localhost:5173 or https://yourapp.netlify.app
# ===============================
app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# APNs (Apple Push Notification service)
# Set via environment variables — leave blank to disable push (SSE still works).
#
# Steps to enable:
#   1. In Apple Developer portal → Certificates → Keys → create an APNs key (.p8)
#   2. Note the Key ID and your Team ID (top-right of the portal)
#   3. Set APNS_TEAM_ID, APNS_KEY_ID, APNS_PRIVATE_KEY (full p8 content, \n-separated)
#   4. Set APNS_BUNDLE_ID to match your Xcode bundle identifier
#   5. Set APNS_SANDBOX=false for production / App Store builds
# ===============================
apns.team-id=${APNS_TEAM_ID:}
apns.key-id=${APNS_KEY_ID:}
# Provide either a filesystem path (preferred for local dev) OR the inline
# PEM contents (escape newlines as \n in env-var form). The path takes
# precedence when both are set.
apns.private-key-path=${APNS_PRIVATE_KEY_PATH:}
apns.private-key=${APNS_PRIVATE_KEY:}
# Per-platform bundle IDs — the apns-topic header must match the recipient
# app's bundle. macOS Forma and iOS forma-ios have different bundle IDs.
apns.bundle-id-macos=${APNS_BUNDLE_ID_MACOS:jashanveer.Forma}
apns.bundle-id-ios=${APNS_BUNDLE_ID_IOS:jashanveer.forma-ios}
apns.sandbox=${APNS_SANDBOX:true}

# ===============================
# Email (SMTP)
# Leave MAIL_HOST blank to disable email sending entirely.
#
# Gmail quick-start:
#   1. Enable "App Passwords" in your Google account (requires 2FA)
#   2. Set MAIL_HOST=smtp.gmail.com  MAIL_PORT=587
#      MAIL_USERNAME=you@gmail.com  MAIL_PASSWORD=<app-password>
#      MAIL_FROM=you@gmail.com
#
# SendGrid / Mailgun / AWS SES also work — just point to their SMTP endpoint.
# ===============================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from=${MAIL_FROM:noreply@habit-tracker.app}
app.reset-base-url=${RESET_BASE_URL:https://habit-tracker.app/reset}
app.email.app-url=${APP_URL:https://habit-tracker.app}

# ===============================
# Anthropic / Claude AI — primary mentor provider
# Drives the weekly insight email and every AI mentor turn (welcome, chat
# replies, periodic check-ins, overload nudges, memory distillation).
# Leave the API key blank to disable AI text generation — AI-mentor matches
# still get assigned but reply with a static welcome line.
#
# Default model is Haiku 4.5 — cheapest current Claude, dramatically better
# than older Haikus at holding a persona for short outputs. Override with
# ANTHROPIC_MODEL=claude-sonnet-4-6 if persona quality > cost on your account.
# ===============================
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

# ===============================
# Google Gemini AI — cold-swap escape hatch
# Kept wired so we can flip back to Gemini without redeploying if Anthropic
# has an outage. Not used in production unless MENTOR_PROVIDER=gemini.
# Free-tier key: https://aistudio.google.com/apikey
# ===============================
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# Pick which provider backs the MentorAI interface.
# Values: anthropic | gemini. Default: anthropic.
mentor.provider=${MENTOR_PROVIDER:anthropic}
